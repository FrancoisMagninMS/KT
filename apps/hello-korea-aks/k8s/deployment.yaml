apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-korea
  labels:
    app: hello-korea
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-korea
  template:
    metadata:
      labels:
        app: hello-korea
    spec:
      containers:
        - name: hello-korea
          image: __ACR_LOGIN_SERVER__/hello-korea-aks:latest
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi

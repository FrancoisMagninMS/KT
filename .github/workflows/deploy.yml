name: Deploy KT Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ARM_USE_AZUREAD: true

permissions:
  contents: read
  security-events: write
  id-token: write

jobs:
  validate-config:
    name: Validate Configuration
    runs-on: ubuntu-latest
    environment: DEV
    steps:
      - name: Check required secrets and variables
        run: |
          missing=0

          check_secret() {
            if [ -z "$1" ]; then
              echo "::error::Missing secret: $2"
              missing=1
            else
              echo "✓ Secret $2 is set"
            fi
          }

          check_var() {
            if [ -z "$1" ]; then
              echo "::error::Missing variable: $2"
              missing=1
            else
              echo "✓ Variable $2 = $1"
            fi
          }

          check_secret "${{ secrets.AZURE_CLIENT_ID }}" "AZURE_CLIENT_ID"
          check_secret "${{ secrets.AZURE_SUBSCRIPTION_ID }}" "AZURE_SUBSCRIPTION_ID"
          check_secret "${{ secrets.AZURE_TENANT_ID }}" "AZURE_TENANT_ID"
          check_secret "${{ secrets.PG_ADMIN_PASSWORD }}" "PG_ADMIN_PASSWORD"
          check_var "${{ vars.ALERT_EMAIL }}" "ALERT_EMAIL"

          if [ "$missing" -eq 1 ]; then
            echo ""
            echo "::error::One or more required secrets/variables are missing. Run scripts/setup-github.ps1 to configure them."
            exit 1
          fi

          echo ""
          echo "All required configuration is present."

  security-scan:
    name: Security Scanning
    needs: validate-config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Terraform format check ──
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.3"
          terraform_wrapper: false

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform

      # ── Terraform static analysis with tfsec ──
      - name: Install tfsec
        run: |
          curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash

      - name: tfsec — Terraform Security Scanner
        run: tfsec terraform --format sarif --out tfsec-results.sarif --soft-fail

      - name: Upload tfsec SARIF
        if: always() && hashFiles('tfsec-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: tfsec-results.sarif
          category: tfsec

      # ── Terraform linting with TFLint ──
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Init TFLint
        run: tflint --init
        working-directory: terraform

      - name: Run TFLint
        run: tflint --format compact --force
        working-directory: terraform

      # ── Checkov — broad IaC policy scanning ──
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,checkov-results.sarif
          soft_fail: true
          config_file: terraform/.checkov.yaml

      - name: Upload Checkov SARIF
        if: always() && hashFiles('checkov-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov-results.sarif
          category: checkov

      # ── Detect secrets in code ──
      - name: Detect Secrets
        uses: trufflesecurity/trufflehog@v3.88.12
        with:
          extra_args: --only-verified --results=verified

      # ── Container image scanning (runs only if Dockerfiles exist) ──
      - name: Check for Dockerfiles
        id: check_dockerfiles
        run: |
          if find . -name "Dockerfile" -type f | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No Dockerfiles found — skipping container scan"
          fi

      - name: Build container images for scanning
        if: steps.check_dockerfiles.outputs.found == 'true'
        run: |
          for dockerfile in $(find . -name "Dockerfile" -type f); do
            dir=$(dirname "$dockerfile")
            name=$(basename "$dir")
            echo "Building $name from $dir..."
            docker build -t "scan-${name}:latest" "$dir"
          done

      - name: Trivy — Container Vulnerability Scan
        if: steps.check_dockerfiles.outputs.found == 'true'
        run: |
          # Install Trivy
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

          for dockerfile in $(find . -name "Dockerfile" -type f); do
            dir=$(dirname "$dockerfile")
            name=$(basename "$dir")
            echo "::group::Scanning $name"
            trivy image --exit-code 1 --severity HIGH,CRITICAL \
              --format table "scan-${name}:latest"
            echo "::endgroup::"
          done

  bootstrap:
    name: Bootstrap Terraform Backend
    needs: security-scan
    runs-on: ubuntu-latest
    environment: DEV
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Terraform State Backend
        run: |
          az group create \
            --name rg-kt-tfstate \
            --location koreacentral \
            -o none 2>/dev/null || true

          az storage account create \
            --name stkttfstate \
            --resource-group rg-kt-tfstate \
            --sku Standard_LRS \
            --encryption-services blob \
            --min-tls-version TLS1_2 \
            --allow-blob-public-access false \
            -o none 2>/dev/null || true

          az storage container create \
            --name tfstate \
            --account-name stkttfstate \
            --auth-mode login \
            -o none 2>/dev/null || true

          # Assign Storage Blob Data Contributor to the SP for Azure AD-based backend auth
          STORAGE_ID=$(az storage account show --name stkttfstate --resource-group rg-kt-tfstate --query id -o tsv)
          SP_OBJECT_ID=$(az ad sp show --id "${{ secrets.AZURE_CLIENT_ID }}" --query id -o tsv)

          echo "Storage Account ID: $STORAGE_ID"
          echo "SP Object ID: $SP_OBJECT_ID"

          az role assignment create \
            --assignee-object-id "$SP_OBJECT_ID" \
            --assignee-principal-type ServicePrincipal \
            --role "Storage Blob Data Contributor" \
            --scope "$STORAGE_ID" \
            -o none || echo "Role assignment may already exist"

          # Verify the role assignment
          echo "Verifying role assignment..."
          ROLE_COUNT=$(az role assignment list \
            --assignee "$SP_OBJECT_ID" \
            --scope "$STORAGE_ID" \
            --role "Storage Blob Data Contributor" \
            --query "length(@)" -o tsv)

          if [ "$ROLE_COUNT" -eq 0 ]; then
            echo "::error::Storage Blob Data Contributor role not assigned! Check SP permissions."
            exit 1
          fi

          echo "Role assignment verified ($ROLE_COUNT assignment(s) found)"

  terraform:
    name: Terraform ${{ github.event.inputs.action }}
    needs: bootstrap
    runs-on: ubuntu-latest
    environment: DEV
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: 'true'
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_pg_admin_password: ${{ secrets.PG_ADMIN_PASSWORD }}
      TF_VAR_alert_email: ${{ vars.ALERT_EMAIL }}
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.3"
          terraform_wrapper: false

      - name: Verify Terraform version
        run: terraform version
        working-directory: .

      - name: Debug env vars
        run: |
          echo "ARM_CLIENT_ID set: $( [ -z \"$ARM_CLIENT_ID\" ] && echo NO || echo YES )"
          echo "ARM_TENANT_ID set: $( [ -z \"$ARM_TENANT_ID\" ] && echo NO || echo YES )"
          echo "ARM_SUBSCRIPTION_ID set: $( [ -z \"$ARM_SUBSCRIPTION_ID\" ] && echo NO || echo YES )"
          echo "ARM_USE_AZUREAD: $ARM_USE_AZUREAD"
          echo "ARM_USE_OIDC: $ARM_USE_OIDC"
        working-directory: .

      - name: Terraform Init
        run: |
          terraform init -reconfigure \
            -backend-config="resource_group_name=rg-kt-tfstate" \
            -backend-config="storage_account_name=stkttfstate" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=kt-infrastructure.tfstate" \
            -backend-config="use_azuread_auth=true" \
            -backend-config="client_id=${ARM_CLIENT_ID}" \
            -backend-config="tenant_id=${ARM_TENANT_ID}" \
            -backend-config="subscription_id=${ARM_SUBSCRIPTION_ID}" \
            -backend-config="use_oidc=true"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: terraform/tfplan
          retention-days: 5

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan

      - name: Export Terraform Outputs
        if: github.event.inputs.action == 'apply'
        id: tf_outputs
        run: |
          echo "acr_login_server=$(terraform output -raw acr_login_server)" >> "$GITHUB_OUTPUT"
          echo "aks_cluster_name=$(terraform output -raw aks_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "resource_group_name=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve

    outputs:
      acr_login_server: ${{ steps.tf_outputs.outputs.acr_login_server }}
      aks_cluster_name: ${{ steps.tf_outputs.outputs.aks_cluster_name }}
      resource_group_name: ${{ steps.tf_outputs.outputs.resource_group_name }}

  build-and-push:
    name: Build & Push Container Images
    needs: terraform
    if: github.event.inputs.action == 'apply'
    runs-on: ubuntu-latest
    environment: DEV
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name "${{ needs.terraform.outputs.acr_login_server }}"

      - name: Build & Push AKS Image
        run: |
          az acr build \
            --registry "${{ needs.terraform.outputs.acr_login_server }}" \
            --image hello-korea-aks:${{ github.sha }} \
            --image hello-korea-aks:latest \
            apps/hello-korea-aks/

      - name: Build & Push ACA Image
        run: |
          az acr build \
            --registry "${{ needs.terraform.outputs.acr_login_server }}" \
            --image hello-korea-aca:${{ github.sha }} \
            --image hello-korea-aca:latest \
            apps/hello-korea-aca/

  deploy-aks:
    name: Deploy to AKS
    needs: [terraform, build-and-push]
    if: github.event.inputs.action == 'apply'
    runs-on: ubuntu-latest
    environment: DEV
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Prepare K8s Manifests
        run: |
          sed -i "s|__ACR_LOGIN_SERVER__|${{ needs.terraform.outputs.acr_login_server }}|g" apps/hello-korea-aks/k8s/deployment.yaml
          # Use SHA tag for immutable deployments
          sed -i "s|:latest|:${{ github.sha }}|g" apps/hello-korea-aks/k8s/deployment.yaml
          echo "--- Final manifest ---"
          cat apps/hello-korea-aks/k8s/deployment.yaml

      - name: Deploy to Private AKS
        run: |
          RG="${{ needs.terraform.outputs.resource_group_name }}"
          AKS="${{ needs.terraform.outputs.aks_cluster_name }}"

          az aks command invoke \
            --resource-group "$RG" \
            --name "$AKS" \
            --command "kubectl apply -f deployment.yaml -f service.yaml" \
            --file apps/hello-korea-aks/k8s/deployment.yaml \
            --file apps/hello-korea-aks/k8s/service.yaml

      - name: Verify AKS Deployment
        run: |
          RG="${{ needs.terraform.outputs.resource_group_name }}"
          AKS="${{ needs.terraform.outputs.aks_cluster_name }}"

          az aks command invoke \
            --resource-group "$RG" \
            --name "$AKS" \
            --command "kubectl rollout status deployment/hello-korea --timeout=120s"

  deploy-aca:
    name: Deploy to ACA
    needs: [terraform, build-and-push]
    if: github.event.inputs.action == 'apply'
    runs-on: ubuntu-latest
    environment: DEV
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update ACA Container Image
        run: |
          az containerapp update \
            --name ca-hello-korea \
            --resource-group "${{ needs.terraform.outputs.resource_group_name }}" \
            --image "${{ needs.terraform.outputs.acr_login_server }}/hello-korea-aca:${{ github.sha }}"

      - name: Verify ACA Deployment
        run: |
          az containerapp show \
            --name ca-hello-korea \
            --resource-group "${{ needs.terraform.outputs.resource_group_name }}" \
            --query "{name:name, provisioningState:properties.provisioningState, latestRevision:properties.latestRevisionName, runningStatus:properties.runningStatus}" \
            -o table

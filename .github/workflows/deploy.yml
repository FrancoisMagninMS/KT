name: Deploy KT Infrastructure

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - qa
          - prod

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ARM_USE_AZUREAD: true

permissions:
  contents: read
  security-events: write
  id-token: write

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Reusable job anchors are not supported in GitHub Actions, so each environment
# stage repeats the full set of jobs with its own environment context.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # SHARED — Security scanning (runs once per pipeline execution)
  # ═══════════════════════════════════════════════════════════════════════════

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Terraform format check ──
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.3"
          terraform_wrapper: false

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform

      # ── Terraform static analysis with tfsec ──
      - name: Install tfsec
        run: |
          curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash

      - name: tfsec — Terraform Security Scanner
        run: tfsec terraform --format sarif --out tfsec-results.sarif --soft-fail

      - name: Upload tfsec SARIF
        if: always() && hashFiles('tfsec-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: tfsec-results.sarif
          category: tfsec

      # ── Terraform linting with TFLint ──
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Init TFLint
        run: tflint --init
        working-directory: terraform

      - name: Run TFLint
        run: tflint --format compact --force
        working-directory: terraform

      # ── Checkov — broad IaC policy scanning ──
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,checkov-results.sarif
          soft_fail: true
          config_file: terraform/.checkov.yaml

      - name: Upload Checkov SARIF
        if: always() && hashFiles('checkov-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov-results.sarif
          category: checkov

      # ── Detect secrets in code ──
      - name: Detect Secrets
        uses: trufflesecurity/trufflehog@v3.88.12
        with:
          extra_args: --only-verified --results=verified

      # ── Container image scanning (runs only if Dockerfiles exist) ──
      - name: Check for Dockerfiles
        id: check_dockerfiles
        run: |
          if find . -name "Dockerfile" -type f | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No Dockerfiles found — skipping container scan"
          fi

      - name: Build container images for scanning
        if: steps.check_dockerfiles.outputs.found == 'true'
        run: |
          for dockerfile in $(find . -name "Dockerfile" -type f); do
            dir=$(dirname "$dockerfile")
            name=$(basename "$dir")
            echo "Building $name from $dir..."
            docker build -t "scan-${name}:latest" "$dir"
          done

      - name: Trivy — Container Vulnerability Scan
        if: steps.check_dockerfiles.outputs.found == 'true'
        run: |
          # Install Trivy
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

          for dockerfile in $(find . -name "Dockerfile" -type f); do
            dir=$(dirname "$dockerfile")
            name=$(basename "$dir")
            echo "::group::Scanning $name"
            trivy image --exit-code 1 --severity HIGH,CRITICAL \
              --format table "scan-${name}:latest"
            echo "::endgroup::"
          done

  # ═══════════════════════════════════════════════════════════════════════════
  # SHARED — Bootstrap Terraform state backend (idempotent)
  # ═══════════════════════════════════════════════════════════════════════════

  bootstrap:
    name: Bootstrap Terraform Backend
    needs: security-scan
    runs-on: ubuntu-latest
    environment: DEV
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Terraform State Backend
        run: |
          az group create \
            --name rg-kt-tfstate \
            --location koreacentral \
            -o none 2>/dev/null || true

          az storage account create \
            --name stkttfstate \
            --resource-group rg-kt-tfstate \
            --sku Standard_LRS \
            --encryption-services blob \
            --min-tls-version TLS1_2 \
            --allow-blob-public-access false \
            --public-network-access Enabled \
            -o none 2>/dev/null || true

          # Ensure public network access stays enabled (Azure policies may disable it)
          az storage account update \
            --name stkttfstate \
            --resource-group rg-kt-tfstate \
            --public-network-access Enabled \
            -o none 2>/dev/null || true

          az storage container create \
            --name tfstate \
            --account-name stkttfstate \
            --auth-mode login \
            -o none 2>/dev/null || true

          # Assign Storage Blob Data Contributor to the SP for Azure AD-based backend auth
          STORAGE_ID=$(az storage account show --name stkttfstate --resource-group rg-kt-tfstate --query id -o tsv)
          SP_OBJECT_ID=$(az ad sp show --id "${{ secrets.AZURE_CLIENT_ID }}" --query id -o tsv)

          echo "Storage Account ID: $STORAGE_ID"
          echo "SP Object ID: $SP_OBJECT_ID"

          az role assignment create \
            --assignee-object-id "$SP_OBJECT_ID" \
            --assignee-principal-type ServicePrincipal \
            --role "Storage Blob Data Contributor" \
            --scope "$STORAGE_ID" \
            -o none || echo "Role assignment may already exist"

          # Verify the role assignment
          echo "Verifying role assignment..."
          ROLE_COUNT=$(az role assignment list \
            --assignee "$SP_OBJECT_ID" \
            --scope "$STORAGE_ID" \
            --role "Storage Blob Data Contributor" \
            --query "length(@)" -o tsv)

          if [ "$ROLE_COUNT" -eq 0 ]; then
            echo "::error::Storage Blob Data Contributor role not assigned! Check SP permissions."
            exit 1
          fi

          echo "Role assignment verified ($ROLE_COUNT assignment(s) found)"

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 1 — DEV (auto-deploy on push, or manual workflow_dispatch)
  # ═══════════════════════════════════════════════════════════════════════════

  # ── Should this run? ──
  should-deploy-dev:
    name: 'Check: DEV deployment'
    needs: bootstrap
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
      action: ${{ steps.check.outputs.action }}
    steps:
      - name: Evaluate trigger
        id: check
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "action=apply" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.environment }}" = "dev" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "action=${{ github.event.inputs.action }}" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "action=none" >> "$GITHUB_OUTPUT"
          fi

  terraform-dev:
    name: 'Terraform DEV (${{ needs.should-deploy-dev.outputs.action }})'
    needs: should-deploy-dev
    if: needs.should-deploy-dev.outputs.run == 'true'
    runs-on: ubuntu-latest
    environment: DEV
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: 'true'
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_pg_admin_password: ${{ secrets.PG_ADMIN_PASSWORD }}
      TF_VAR_alert_email: ${{ vars.ALERT_EMAIL }}
      TF_VAR_environment: dev
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.3"
          terraform_wrapper: false

      - name: Debug env vars
        run: |
          echo "ARM_CLIENT_ID set: $( [ -z \"$ARM_CLIENT_ID\" ] && echo NO || echo YES )"
          echo "ARM_TENANT_ID set: $( [ -z \"$ARM_TENANT_ID\" ] && echo NO || echo YES )"
          echo "ARM_SUBSCRIPTION_ID set: $( [ -z \"$ARM_SUBSCRIPTION_ID\" ] && echo NO || echo YES )"
          echo "ARM_USE_AZUREAD: $ARM_USE_AZUREAD"
          echo "ARM_USE_OIDC: $ARM_USE_OIDC"
          echo "TF_VAR_environment: $TF_VAR_environment"
        working-directory: .

      - name: Terraform Init
        run: |
          terraform init -reconfigure \
            -backend-config="resource_group_name=rg-kt-tfstate" \
            -backend-config="storage_account_name=stkttfstate" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=kt-infrastructure-dev.tfstate" \
            -backend-config="use_azuread_auth=true" \
            -backend-config="client_id=${ARM_CLIENT_ID}" \
            -backend-config="tenant_id=${ARM_TENANT_ID}" \
            -backend-config="subscription_id=${ARM_SUBSCRIPTION_ID}" \
            -backend-config="use_oidc=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -lock-timeout=5m -out=tfplan

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev-${{ github.run_id }}
          path: terraform/tfplan
          retention-days: 5
          overwrite: true

      - name: Terraform Apply
        if: needs.should-deploy-dev.outputs.action == 'apply'
        run: terraform apply -lock-timeout=5m -auto-approve tfplan

      - name: Export Terraform Outputs
        if: needs.should-deploy-dev.outputs.action == 'apply'
        id: tf_outputs
        run: |
          echo "acr_login_server=$(terraform output -raw acr_login_server)" >> "$GITHUB_OUTPUT"
          echo "aks_cluster_name=$(terraform output -raw aks_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "resource_group_name=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"
          echo "key_vault_name=$(terraform output -raw key_vault_name)" >> "$GITHUB_OUTPUT"
          echo "tenant_id=$(terraform output -raw tenant_id)" >> "$GITHUB_OUTPUT"
          echo "aks_kubelet_client_id=$(terraform output -raw aks_kubelet_client_id)" >> "$GITHUB_OUTPUT"

      - name: Terraform Destroy
        if: needs.should-deploy-dev.outputs.action == 'destroy'
        run: terraform destroy -lock-timeout=5m -auto-approve

    outputs:
      acr_login_server: ${{ steps.tf_outputs.outputs.acr_login_server }}
      aks_cluster_name: ${{ steps.tf_outputs.outputs.aks_cluster_name }}
      resource_group_name: ${{ steps.tf_outputs.outputs.resource_group_name }}
      key_vault_name: ${{ steps.tf_outputs.outputs.key_vault_name }}
      tenant_id: ${{ steps.tf_outputs.outputs.tenant_id }}
      aks_kubelet_client_id: ${{ steps.tf_outputs.outputs.aks_kubelet_client_id }}

  build-and-push-dev:
    name: 'Build & Push (DEV)'
    needs: [should-deploy-dev, terraform-dev]
    if: needs.should-deploy-dev.outputs.action == 'apply'
    runs-on: ubuntu-latest
    environment: DEV
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name "${{ needs.terraform-dev.outputs.acr_login_server }}"

      - name: Build & Push AKS Image
        run: |
          az acr build \
            --registry "${{ needs.terraform-dev.outputs.acr_login_server }}" \
            --image hello-korea-aks:${{ github.sha }} \
            --image hello-korea-aks:latest \
            apps/hello-korea-aks/

      - name: Build & Push ACA Image
        run: |
          az acr build \
            --registry "${{ needs.terraform-dev.outputs.acr_login_server }}" \
            --image hello-korea-aca:${{ github.sha }} \
            --image hello-korea-aca:latest \
            apps/hello-korea-aca/

  deploy-aks-dev:
    name: 'Deploy to AKS (DEV)'
    needs: [should-deploy-dev, terraform-dev, build-and-push-dev]
    if: needs.should-deploy-dev.outputs.action == 'apply'
    runs-on: ubuntu-latest
    environment: DEV
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Prepare K8s Manifests
        run: |
          sed -i "s|__ACR_LOGIN_SERVER__|${{ needs.terraform-dev.outputs.acr_login_server }}|g" apps/hello-korea-aks/k8s/deployment.yaml
          sed -i "s|:latest|:${{ github.sha }}|g" apps/hello-korea-aks/k8s/deployment.yaml
          sed -i "s|__KEY_VAULT_NAME__|${{ needs.terraform-dev.outputs.key_vault_name }}|g" apps/hello-korea-aks/k8s/secret-provider-class.yaml
          sed -i "s|__TENANT_ID__|${{ needs.terraform-dev.outputs.tenant_id }}|g" apps/hello-korea-aks/k8s/secret-provider-class.yaml
          sed -i "s|__KUBELET_CLIENT_ID__|${{ needs.terraform-dev.outputs.aks_kubelet_client_id }}|g" apps/hello-korea-aks/k8s/secret-provider-class.yaml

      - name: Deploy to Private AKS
        run: |
          RG="${{ needs.terraform-dev.outputs.resource_group_name }}"
          AKS="${{ needs.terraform-dev.outputs.aks_cluster_name }}"

          az aks command invoke \
            --resource-group "$RG" \
            --name "$AKS" \
            --command "kubectl apply -f secret-provider-class.yaml -f deployment.yaml -f service.yaml" \
            --file apps/hello-korea-aks/k8s/secret-provider-class.yaml \
            --file apps/hello-korea-aks/k8s/deployment.yaml \
            --file apps/hello-korea-aks/k8s/service.yaml

      - name: Verify AKS Deployment
        run: |
          RG="${{ needs.terraform-dev.outputs.resource_group_name }}"
          AKS="${{ needs.terraform-dev.outputs.aks_cluster_name }}"

          az aks command invoke \
            --resource-group "$RG" \
            --name "$AKS" \
            --command "kubectl rollout status deployment/hello-korea --timeout=120s"

  deploy-aca-dev:
    name: 'Deploy to ACA (DEV)'
    needs: [should-deploy-dev, terraform-dev, build-and-push-dev]
    if: needs.should-deploy-dev.outputs.action == 'apply'
    runs-on: ubuntu-latest
    environment: DEV
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update ACA Container Image
        run: |
          az containerapp update \
            --name ca-hello-korea \
            --resource-group "${{ needs.terraform-dev.outputs.resource_group_name }}" \
            --image "${{ needs.terraform-dev.outputs.acr_login_server }}/hello-korea-aca:${{ github.sha }}"

      - name: Verify ACA Deployment
        run: |
          az containerapp show \
            --name ca-hello-korea \
            --resource-group "${{ needs.terraform-dev.outputs.resource_group_name }}" \
            --query "{name:name, provisioningState:properties.provisioningState, latestRevision:properties.latestRevisionName, runningStatus:properties.runningStatus}" \
            -o table

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 2 — TEST (auto-deploy after successful DEV deployment)
  # ═══════════════════════════════════════════════════════════════════════════

  terraform-test:
    name: 'Terraform TEST (apply)'
    needs: [should-deploy-dev, terraform-dev, deploy-aks-dev, deploy-aca-dev]
    if: |
      always() &&
      needs.should-deploy-dev.outputs.action == 'apply' &&
      needs.terraform-dev.result == 'success' &&
      (needs.deploy-aks-dev.result == 'success' || needs.deploy-aks-dev.result == 'skipped') &&
      (needs.deploy-aca-dev.result == 'success' || needs.deploy-aca-dev.result == 'skipped')
    runs-on: ubuntu-latest
    environment: TEST
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: 'true'
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_pg_admin_password: ${{ secrets.PG_ADMIN_PASSWORD }}
      TF_VAR_alert_email: ${{ vars.ALERT_EMAIL }}
      TF_VAR_environment: test
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.3"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init -reconfigure \
            -backend-config="resource_group_name=rg-kt-tfstate" \
            -backend-config="storage_account_name=stkttfstate" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=kt-infrastructure-test.tfstate" \
            -backend-config="use_azuread_auth=true" \
            -backend-config="client_id=${ARM_CLIENT_ID}" \
            -backend-config="tenant_id=${ARM_TENANT_ID}" \
            -backend-config="subscription_id=${ARM_SUBSCRIPTION_ID}" \
            -backend-config="use_oidc=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -lock-timeout=5m -out=tfplan

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-test-${{ github.run_id }}
          path: terraform/tfplan
          retention-days: 5
          overwrite: true

      - name: Terraform Apply
        run: terraform apply -lock-timeout=5m -auto-approve tfplan

      - name: Export Terraform Outputs
        id: tf_outputs
        run: |
          echo "acr_login_server=$(terraform output -raw acr_login_server)" >> "$GITHUB_OUTPUT"
          echo "aks_cluster_name=$(terraform output -raw aks_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "resource_group_name=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"
          echo "key_vault_name=$(terraform output -raw key_vault_name)" >> "$GITHUB_OUTPUT"
          echo "tenant_id=$(terraform output -raw tenant_id)" >> "$GITHUB_OUTPUT"
          echo "aks_kubelet_client_id=$(terraform output -raw aks_kubelet_client_id)" >> "$GITHUB_OUTPUT"

    outputs:
      acr_login_server: ${{ steps.tf_outputs.outputs.acr_login_server }}
      aks_cluster_name: ${{ steps.tf_outputs.outputs.aks_cluster_name }}
      resource_group_name: ${{ steps.tf_outputs.outputs.resource_group_name }}
      key_vault_name: ${{ steps.tf_outputs.outputs.key_vault_name }}
      tenant_id: ${{ steps.tf_outputs.outputs.tenant_id }}
      aks_kubelet_client_id: ${{ steps.tf_outputs.outputs.aks_kubelet_client_id }}

  build-and-push-test:
    name: 'Build & Push (TEST)'
    needs: terraform-test
    runs-on: ubuntu-latest
    environment: TEST
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name "${{ needs.terraform-test.outputs.acr_login_server }}"

      - name: Build & Push AKS Image
        run: |
          az acr build \
            --registry "${{ needs.terraform-test.outputs.acr_login_server }}" \
            --image hello-korea-aks:${{ github.sha }} \
            --image hello-korea-aks:latest \
            apps/hello-korea-aks/

      - name: Build & Push ACA Image
        run: |
          az acr build \
            --registry "${{ needs.terraform-test.outputs.acr_login_server }}" \
            --image hello-korea-aca:${{ github.sha }} \
            --image hello-korea-aca:latest \
            apps/hello-korea-aca/

  deploy-aks-test:
    name: 'Deploy to AKS (TEST)'
    needs: [terraform-test, build-and-push-test]
    runs-on: ubuntu-latest
    environment: TEST
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Prepare K8s Manifests
        run: |
          sed -i "s|__ACR_LOGIN_SERVER__|${{ needs.terraform-test.outputs.acr_login_server }}|g" apps/hello-korea-aks/k8s/deployment.yaml
          sed -i "s|:latest|:${{ github.sha }}|g" apps/hello-korea-aks/k8s/deployment.yaml
